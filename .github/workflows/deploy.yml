name: CI/CD Deployment

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Application
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Deploy Firebase Rules
        run: npx firebase-tools deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID }}

      # Étape additionnelle : Préparation pour Cloud Run
      # Pour déployer sur Cloud Run, vous devez :
      # 1. Créer un Dockerfile (je vais le créer pour vous)
      # 2. Configurer Artifact Registry sur GCP
      # 3. Utiliser 'google-github-actions/auth' et 'google-github-actions/deploy-cloudrun'

      # Ici, les étapes pour Cloud Run dépendent de votre configuration GCP.
      # Généralement, vous utiliseriez l'action 'google-github-actions/deploy-cloudrun'
